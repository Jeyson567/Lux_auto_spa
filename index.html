<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUTO LAVADO MONTANA | Login</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="login-body">
  <main class="login-page">
    <section class="login-card">
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <h1 id="loginBusinessName">AUTO LAVADO MONTANA</h1>
          <p class="muted">Control Pro</p>
        </div>
      </div>

      <form id="loginForm" class="stack">
        <input id="email" type="email" placeholder="Correo" required>
        <input id="password" type="password" placeholder="Contraseña" required>
        <button class="btn-primary" type="submit">Ingresar</button>
      </form>

      <p id="loginMessage" class="muted" style="margin-top:12px"></p>
      <p style="margin-top:16px"><a href="portal.html">Portal cliente</a></p>
    </section>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
